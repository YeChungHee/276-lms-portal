let completedChapters=[];

const GLOSSARY=[
 ['중앙은행','국가의 화폐·신용을 관리하는 은행. 1694년 영국 잉글랜드 은행이 세계 최초.'],
 ['자본 집중','흩어진 자금을 한데 모아 대규모 투자에 공급하는 금융의 핵심 역할.'],
 ['위험 분산','위험을 다수에게 나눠 충격을 줄이는 것(보험·분산투자).'],
 ['유동성','자산을 빠르고 손실 없이 현금화할 수 있는 정도.'],
 ['가격 발견','시장의 수요·공급을 통해 적정 가격이 형성되는 과정.'],
 ['자본시장','주식·채권 등 장기 자금이 거래되는 시장. 1880~1910년 급성장.'],
 ['운송 혁명','대량 운송 → 단가 하락 → 가격 인하 → 수요 확대로 이어지는 선순환.'],
 ['표준시','철도 운행을 맞추기 위해 도입된 통일 시간 체계.'],
 ['전국 시장','지역 시장을 넘어 전국이 하나로 연결된 시장(철도가 형성).'],
 ['정보 비대칭','거래 당사자 간 정보 격차로 모르는 쪽이 손해를 보는 상태.'],
 ['거래비용','거래의 탐색·협상·감시·이행에 드는 비용. 통신 발달로 절감.'],
 ['전신·전화','통신 발전의 출발점. 전신 1837년, 전화 1876년.'],
 ['공급망','원자재→생산→유통→고객으로 이어지는 흐름. 통신으로 조정 속도↑.'],
 ['디지털 인프라','핀테크·5G·자율주행을 떠받치는 디지털 기반.'],
 ['5G','4G 대비 속도 약 20배↑, 반응속도 ≤1ms, 동시접속 100만/㎢.'],
 ['초연결','사람·사물·데이터가 촘촘히 연결된 경제 단계.'],
 ['산업혁명','기계화·대량생산으로 인한 경제 대전환(영국 1760~1840 시작).'],
 ['포드주의','컨베이어 기반 대량생산 방식(미국 2차 산업혁명).'],
 ['유니버설뱅크','상업·투자은행 업무를 함께 수행하는 독일식 은행 모델.'],
 ['네트워크 효과','사용자가 늘수록 네트워크 가치가 커지는 현상.'],
 ['메트칼프의 법칙','네트워크 가치 ∝ 사용자 수의 제곱 (V ∝ n²).'],
 ['승자독식','임계점을 넘은 1위 플랫폼이 시장을 장악하는 구조.'],
 ['승수효과','인프라 투자 1단위가 더 큰 경제효과를 만드는 것(교통 1:3~5, 통신 1:4~7, 5G 1:6~10).'],
 ['선순환','저축 → 투자 → 생산 → 소득이 맞물려 성장하는 구조. 금융이 그 엔진.']
];

/* 핵심요약 3단원(1·2 / 3·4 / 5~7) */
const GROUPS=[
 {title:'1·2장 — 금융 시스템과 교통 발달', chs:[0,1]},
 {title:'3·4장 — 통신 발달과 디지털 확장', chs:[2,3]},
 {title:'5~7장 — 산업화·네트워크·핵심 통찰', chs:[4,5,6]}
];
const GTOTAL=GROUPS.length;
const LAST_OF={}; GROUPS.forEach((g,gi)=>{ LAST_OF[g.chs[g.chs.length-1]]=gi; });
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function renderBlocks(blocks){
  return (blocks||[]).map(bl=>{
    const ty=bl.type||'para';
    if(ty==='list') return '<ul>'+bl.items.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>';
    if(ty==='table'){ const head=bl.headers?'<tr>'+bl.headers.map(h=>'<th>'+esc(h)+'</th>').join('')+'</tr>':'';
      const rows=bl.rows.map(r=>'<tr>'+r.map(c=>'<td>'+esc(c)+'</td>').join('')+'</tr>').join('');
      return '<div class="tbl-wrap"><table class="tbl">'+head+rows+'</table></div>'; }
    if(ty==='callout') return '<div class="blk-callout">'+(bl.title?'<b>'+esc(bl.title)+'</b><br>':'')+esc(bl.text)+'</div>';
    if(ty==='formula') return '<div class="blk-formula">'+esc(bl.text)+'</div>';
    return '<p>'+esc(bl.text)+'</p>';
  }).join('');
}
document.getElementById('whoChip').textContent=studentName;
document.getElementById('sidebar').innerHTML='<div class="sidebar-title">목차</div>'+
  CHAPTERS.map((c,i)=>'<a class="nav-item" id="nav'+i+'" href="#ch'+(i+1)+'">'+(i+1)+'. '+esc(c.t)+'</a>').join('')+
  '<a class="nav-item" id="navG" href="#glossary" style="margin-top:8px;font-weight:600;">용어집</a>';
const glossaryHTML=`
  <section class="chapter" id="glossary">
    <div class="chapter-header"><div class="chapter-num" style="background:linear-gradient(135deg,#2E7D32,#1565C0)">用</div><div class="chapter-title">용어집 <span style="font-size:13px;font-weight:400;color:var(--muted)">${GLOSSARY.length}개 핵심 용어</span></div></div>
    <div class="chapter-border"></div>
    <div class="section"><div class="tbl-wrap"><table class="tbl"><tr><th style="width:170px;">용어</th><th>설명</th></tr>
      ${GLOSSARY.map(g=>'<tr><td><b>'+esc(g[0])+'</b></td><td>'+esc(g[1])+'</td></tr>').join('')}
    </table></div></div>
  </section>`;
document.getElementById('chapters').innerHTML=CHAPTERS.map((c,i)=>{
  const g=LAST_OF[i];
  const summary=(g!==undefined)
    ? `<div class="ch-summary"><button class="summary-btn" id="sbtn${g}" onclick="openTip(${g})"><svg width="15" height="15"><use href="#ic-bookmark"/></svg> ${esc(GROUPS[g].title)} · 핵심 요약</button></div>`
    : '';
  return `<section class="chapter" id="ch${i+1}">
    <div class="chapter-header"><div class="chapter-num">${i+1}</div><div class="chapter-title">${esc(c.t)}</div></div>
    <div class="chapter-border"></div>
    <div class="section">${renderBlocks(c.blocks)}</div>${summary}
  </section>`;
}).join('')+glossaryHTML;

function openTip(g){
  const grp=GROUPS[g];
  document.getElementById('tipChip').textContent='핵심 요약 ('+(g+1)+'/'+GTOTAL+')';
  document.getElementById('tipTitle').textContent=grp.title;
  let items=[]; grp.chs.forEach(ci=>{ items=items.concat(CHAPTERS[ci].sum); });
  document.getElementById('tipList').innerHTML=items.map(t=>'<li>'+esc(t)+'</li>').join('');
  const btn=document.getElementById('tipCompleteBtn'); btn.disabled=false;
  btn.textContent=g<GTOTAL-1?'✓ 완료 — 다음 단원으로 이동':'✓ 학습 완료';
  window._tipIdx=g; document.getElementById('tipModal').classList.add('open');
}
function completeTip(){
  const g=window._tipIdx; const btn=document.getElementById('tipCompleteBtn'); btn.disabled=true; btn.textContent='저장 중...';
  fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'progress',name:studentName,chapter:g+1,chapterName:'[경제·금융발달] '+GROUPS[g].title})}).catch(()=>{});
  if(!completedChapters.includes(g)) completedChapters.push(g);
  try{localStorage.setItem(DONE_KEY,JSON.stringify(completedChapters));}catch(e){}
  updateProgress();
  document.getElementById('tipModal').classList.remove('open');
  setTimeout(()=>{
    if(g<GTOTAL-1){ const nx=document.getElementById('ch'+(GROUPS[g+1].chs[0]+1)); if(nx)nx.scrollIntoView({behavior:'smooth',block:'start'}); }
    else{ const db=document.getElementById('doneBar'); if(db){db.classList.add('show');db.scrollIntoView({behavior:'smooth'});} }
  },250);
}
function updateProgress(){
  for(let g=0;g<GTOTAL;g++){ const sb=document.getElementById('sbtn'+g);
    if(sb&&completedChapters.includes(g)){sb.classList.add('done-btn');sb.textContent='✓ '+esc(GROUPS[g].title)+' 완료';} }
  const n=completedChapters.length;
  document.getElementById('pfill').style.width=Math.round(n/GTOTAL*100)+'%';
  document.getElementById('ptext').textContent=n+' / '+GTOTAL+' 단원 ('+Math.round(n/GTOTAL*100)+'%)';
  document.getElementById('doneBar').classList.toggle('show', n>=GTOTAL);
}
function completeTraining(){
  fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'progress',name:studentName,chapter:'완료',chapterName:'[경제·금융발달] ✓ 교육완료'})}).catch(()=>{});
  try{localStorage.setItem(FIN_KEY,'1');}catch(e){}
  alert('경제·금융 발달 교육을 완료했습니다! 대시보드로 이동합니다.');
  location.href='dashboard.html';
}
function logout(){try{localStorage.removeItem('lms_session');localStorage.removeItem('lms_student_name');}catch(e){}location.replace('index.html');}
window.addEventListener('scroll',function(){
  let top=window.scrollY+80, cur=0;
  for(let i=0;i<TOTAL;i++){ const s=document.getElementById('ch'+(i+1)); if(s&&s.offsetTop<=top) cur=i; }
  for(let i=0;i<TOTAL;i++){ const n=document.getElementById('nav'+i); if(n) n.classList.toggle('active',i===cur); }
});
try{completedChapters=JSON.parse(localStorage.getItem(DONE_KEY)||'[]');}catch(e){completedChapters=[];}
updateProgress(); const n0=document.getElementById('nav0'); if(n0)n0.classList.add('active');
</script>
</body>
</html>
