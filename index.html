<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome NewMember System | 276홀딩스 교육 포털</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--brand:#1A237E;--accent:#3949AB;--blue:#1565C0;--green:#2E7D32;--red:#C62828;
  --bg:#F5F6FA;--card:#fff;--border:#E0E3EF;--text:#202124;--muted:#666;}
body{font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;
  background:linear-gradient(135deg,#0D1547,#1A237E 55%,#283593);min-height:100vh;color:var(--text);
  display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:#fff;border-radius:20px;width:100%;max-width:440px;padding:38px 36px 30px;
  box-shadow:0 18px 50px rgba(0,0,0,.35);}
.logo{text-align:center;margin-bottom:6px;}
.logo .mark{font-size:13px;letter-spacing:3px;color:var(--accent);font-weight:700;}
.logo h1{font-size:24px;color:var(--brand);margin-top:6px;font-weight:800;letter-spacing:-.5px;}
.logo .sub{font-size:12.5px;color:var(--muted);margin-top:6px;}
.tabs{display:flex;gap:0;margin:24px 0 22px;border-bottom:2px solid var(--border);}
.tab{flex:1;text-align:center;padding:11px 0;font-size:14.5px;font-weight:700;color:var(--muted);
  cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab.active{color:var(--brand);border-bottom-color:var(--brand);}
.panel{display:none;}
.panel.active{display:block;}
label{display:block;font-size:12.5px;font-weight:700;color:var(--brand);margin:14px 0 6px;}
input,select{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;
  font-family:inherit;font-size:14.5px;outline:none;transition:border-color .15s;}
input:focus,select:focus{border-color:var(--brand);}
.btn{width:100%;border:none;border-radius:12px;padding:14px;font-family:inherit;font-size:15.5px;
  font-weight:700;cursor:pointer;margin-top:22px;}
.btn-primary{background:var(--brand);color:#fff;}
.btn-primary:hover{background:#0D1547;}
.hint{font-size:12px;color:var(--muted);margin-top:14px;line-height:1.6;text-align:center;}
.msg{font-size:13px;border-radius:10px;padding:11px 14px;margin-top:14px;display:none;}
.msg.err{background:#FFEBEE;color:var(--red);display:block;}
.msg.ok{background:#E8F5E9;color:var(--green);display:block;}
.foot{text-align:center;font-size:11px;color:#aaa;margin-top:22px;}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="mark">276 HOLDINGS · EDU PORTAL</div>
    <h1>Welcome NewMember System</h1>
    <div class="sub">신입사원 온보딩 학습 포털 — 로그인 후 교육을 시작하세요</div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">로그인</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">계정 요청</div>
  </div>

  <!-- 로그인 -->
  <div class="panel active" id="panel-login">
    <label for="loginId">로그인 아이디 (사번/이메일 아이디)</label>
    <input id="loginId" type="text" placeholder="예: ankyung 또는 사번" autocomplete="username"
      onkeydown="if(event.key==='Enter')doLogin()">
    <label for="loginName">이름</label>
    <input id="loginName" type="text" placeholder="실명 입력" autocomplete="name"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary" onclick="doLogin()">로그인</button>
    <div class="msg" id="loginMsg"></div>
    <div class="hint">발급받은 아이디와 이름으로 로그인하면 학습 진도가 계정에 기록됩니다.<br><a href="admin-login.html" style="color:var(--accent);font-weight:700;text-decoration:none;">관리자이신가요? 관리자 로그인 →</a></div>
  </div>

  <!-- 계정 요청 / 등록키 가입 -->
  <div class="panel" id="panel-signup">
    <label for="suName">이름</label>
    <input id="suName" type="text" placeholder="실명 (2자 이상)">
    <label for="suPhone">휴대폰</label>
    <input id="suPhone" type="text" placeholder="010-0000-0000">
    <label for="suId">아이디 (이메일용 / 로그인)</label>
    <input id="suId" type="text" placeholder="영문+숫자, 4자 이상">
    <label for="suKey">운영자 등록키 <span style="color:#9aa0b4;font-weight:400">(있는 경우만 · 선택)</span></label>
    <input id="suKey" type="text" placeholder="예: OP-XXXXXXXX-XXXXXXXX" autocomplete="off" oninput="toggleKeyMode()">
    <div id="suPwWrap" style="display:none">
      <label for="suPw">비밀번호 <span style="color:#9aa0b4;font-weight:400">(등록키 가입 시 필수 · 4자 이상)</span></label>
      <input id="suPw" type="password" placeholder="사용할 비밀번호" autocomplete="new-password">
    </div>
    <button class="btn btn-primary" id="suBtn" onclick="doSignup()">계정 요청 제출</button>
    <div class="msg" id="suMsg"></div>
    <div class="hint" id="suHint">요청은 관리자·운영자 승인 후 Slack/이메일로 계정이 전달됩니다.<br>운영자 <b>등록키</b>가 있으면 위에 입력해 바로 가입하세요.</div>
  </div>

  <div class="foot">v1.0 · 276홀딩스 영업지원팀 · 사내 교육 포털</div>
</div>

<script>
/* ───── 세션 계약 (전 교과서 공통) ─────
   localStorage.lms_session = {name, loginId, dept, loginAt}
   localStorage.lms_student_name = name   (진도 기록 하위호환)
   교과서는 lms_session을 읽고, 없으면 index.html로 리다이렉트한다. */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwVv93ic_VlKwnQvm2wUYHtNX44AbYBJCH2XiSJRMiWjoY892NCKftniF5ufUgv2B7s/exec';

function switchTab(t){
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-signup').classList.toggle('active',t==='signup');
  document.getElementById('panel-login').classList.toggle('active',t==='login');
  document.getElementById('panel-signup').classList.toggle('active',t==='signup');
}

const ROLE_LABEL={super:'최고관리자',operator:'운영자',user:'사원'};
function saveSessionAndGo(sess){
  try{
    localStorage.setItem('lms_session',JSON.stringify(sess));
    localStorage.setItem('lms_student_name',sess.name); /* 진도 기록 하위호환 */
  }catch(e){}
  const msg=document.getElementById('loginMsg');
  msg.className='msg ok';
  const isAdm=(sess.role==='super'||sess.role==='operator');
  msg.textContent = isAdm ? (ROLE_LABEL[sess.role]+'(으)로 로그인되었습니다. 대시보드로 이동합니다…') : '로그인되었습니다. 대시보드로 이동합니다…';
  setTimeout(()=>location.href='dashboard.html',500);
}
async function loginReq(id,name,pw){
  const url=APPS_SCRIPT_URL+'?action=login&loginId='+encodeURIComponent(id)
    +'&name='+encodeURIComponent(name)+(pw?('&pw='+encodeURIComponent(pw)):'');
  return await (await fetch(url)).json();
}

async function doLogin(){
  const id=document.getElementById('loginId').value.trim();
  const name=document.getElementById('loginName').value.trim();
  const msg=document.getElementById('loginMsg');
  if(!id||name.length<2){ msg.className='msg err'; msg.textContent='로그인 아이디와 이름(2자 이상)을 입력하세요.'; return; }
  msg.className='msg'; msg.textContent='로그인 확인 중…';
  /* 직원용 문 — 비밀번호 없이 아이디+이름으로만 로그인(학습 세션). 관리자 콘솔은 admin-login.html */
  try{
    const j=await loginReq(id,name);
    if(!j||!j.login){
      /* 구버전 백엔드(unauthorized) 임시 호환 — 사원 즉시 로그인 */
      if(j&&j.message==='unauthorized'){ saveSessionAndGo(sess(name,id,'호환')); return; }
      msg.className='msg err'; msg.textContent=(j&&j.message)||'로그인에 실패했습니다.'; return;
    }
    saveSessionAndGo(sess(j.name||name, id, j.acctStatus||''));
  }catch(e){
    saveSessionAndGo(sess(name,id,'오프라인'));  /* 네트워크 실패 시 오프라인 학습 세션 */
  }
}
/* 직원 세션은 항상 role:'user' — 관리자 권한은 admin-login.html에서만 부여 */
function sess(name,id,status){ return {name:name, loginId:id, dept:'', role:'user', adminToken:'', status:status, loginAt:new Date().toISOString()}; }

/* 등록키 입력 여부에 따라 비밀번호 필드·버튼 라벨 전환 */
function toggleKeyMode(){
  const hasKey=document.getElementById('suKey').value.trim().length>0;
  document.getElementById('suPwWrap').style.display=hasKey?'':'none';
  document.getElementById('suBtn').textContent=hasKey?'등록키로 가입':'계정 요청 제출';
  document.getElementById('suHint').innerHTML=hasKey
    ? '운영자 등록키로 즉시 가입합니다. 가입 후 로그인 탭에서 아이디·이름·비밀번호로 로그인하세요.'
    : '요청은 관리자·운영자 승인 후 Slack/이메일로 계정이 전달됩니다.<br>운영자 <b>등록키</b>가 있으면 위에 입력해 바로 가입하세요.';
}

async function doSignup(){
  const name=document.getElementById('suName').value.trim();
  const phone=document.getElementById('suPhone').value.trim();
  const id=document.getElementById('suId').value.trim();
  const key=document.getElementById('suKey').value.trim();
  const pw=document.getElementById('suPw').value;
  const msg=document.getElementById('suMsg');

  if(key){ /* ── 등록키 가입(운영자) ── */
    if(name.length<2||id.length<4||pw.length<4){ msg.className='msg err'; msg.textContent='이름(2자+), 아이디(4자+), 비밀번호(4자+)를 확인하세요.'; return; }
    msg.className='msg'; msg.textContent='등록키 확인 중…';
    try{
      const u=APPS_SCRIPT_URL+'?action=register_with_key&regkey='+encodeURIComponent(key)
        +'&loginId='+encodeURIComponent(id)+'&name='+encodeURIComponent(name)
        +'&phone='+encodeURIComponent(phone)+'&pw='+encodeURIComponent(pw);
      const j=await (await fetch(u)).json();
      if(j.status!=='ok'||!j.registered){ msg.className='msg err'; msg.textContent=(j&&j.message)||'등록키 가입 실패'; return; }
      msg.className='msg ok'; msg.textContent=(ROLE_LABEL[j.role]||'계정')+' 가입 완료! 로그인 탭에서 로그인하세요.';
      ['suName','suPhone','suId','suKey','suPw'].forEach(x=>{document.getElementById(x).value='';}); toggleKeyMode();
    }catch(e){ msg.className='msg err'; msg.textContent='서버 연결 실패 — 잠시 후 다시 시도하세요.'; }
    return;
  }

  /* ── 계정 요청(사원) — 관리자·운영자 승인 대기 ── */
  if(name.length<2||!phone||id.length<4){ msg.className='msg err'; msg.textContent='이름(2자+), 휴대폰, 아이디(4자+)를 확인하세요.'; return; }
  fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'signup',name,phone,emailId:id})}).catch(()=>{});
  msg.className='msg ok'; msg.textContent='계정 요청이 접수되었습니다. 승인 후 안내드립니다.';
  document.getElementById('suName').value='';document.getElementById('suPhone').value='';
  document.getElementById('suId').value='';
}

/* 이미 로그인된 상태면 대시보드로 */
window.addEventListener('DOMContentLoaded',()=>{
  try{
    const s=JSON.parse(localStorage.getItem('lms_session')||'null');
    if(s&&s.name){ /* 자동 이동 원치 않으면 주석 */ }
  }catch(e){}
});
</script>
</body>
</html>
