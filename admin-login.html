<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로그인 · Admin Console | 276홀딩스 LMS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--brand:#4527A0;--accent:#5E35B1;--dark:#311B92;--green:#2E7D32;--red:#C62828;
  --border:#D1C4E9;--text:#202124;--muted:#667085;}
body{font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;
  background:linear-gradient(135deg,#1A0B3B,#311B92 55%,#4527A0);min-height:100vh;color:var(--text);
  display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:#fff;border-radius:20px;width:100%;max-width:400px;padding:38px 34px 28px;
  box-shadow:0 18px 50px rgba(0,0,0,.4);}
.logo{text-align:center;margin-bottom:8px;}
.logo .mark{font-size:12px;letter-spacing:2.5px;color:var(--accent);font-weight:700;}
.logo h1{font-size:23px;color:var(--dark);margin-top:6px;font-weight:800;letter-spacing:-.5px;}
.logo .sub{font-size:12.5px;color:var(--muted);margin-top:6px;}
label{display:block;font-size:12.5px;font-weight:700;color:var(--brand);margin:16px 0 6px;}
input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;
  font-family:inherit;font-size:14.5px;outline:none;transition:border-color .15s;}
input:focus{border-color:var(--brand);}
.btn{width:100%;border:none;border-radius:12px;padding:14px;font-family:inherit;font-size:15.5px;
  font-weight:700;cursor:pointer;margin-top:22px;background:var(--accent);color:#fff;}
.btn:hover{background:var(--dark);}
.note{font-size:12px;color:var(--brand);background:#EDE7F6;border-radius:9px;padding:10px 12px;margin-top:16px;
  line-height:1.55;display:flex;gap:7px;align-items:flex-start;}
.note svg{flex-shrink:0;margin-top:1px;}
.msg{font-size:13px;border-radius:10px;padding:11px 14px;margin-top:14px;display:none;}
.msg.err{background:#FFEBEE;color:var(--red);display:block;}
.msg.ok{background:#E8F5E9;color:var(--green);display:block;}
.back{text-align:center;margin-top:16px;}
.back a{font-size:12.5px;color:var(--muted);text-decoration:none;}
.back a:hover{color:var(--brand);}
.foot{text-align:center;font-size:11px;color:#aaa;margin-top:20px;}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="mark">276 HOLDINGS · ADMIN</div>
    <h1>관리자 로그인</h1>
    <div class="sub">관리자·운영자 전용 콘솔 · Admin Console</div>
  </div>

  <label for="loginId">아이디</label>
  <input id="loginId" type="text" placeholder="관리자 로그인 아이디" autocomplete="username"
    onkeydown="if(event.key==='Enter')doAdminLogin()">
  <label for="loginPw">비밀번호</label>
  <input id="loginPw" type="password" placeholder="비밀번호" autocomplete="current-password"
    onkeydown="if(event.key==='Enter')doAdminLogin()">
  <button class="btn" onclick="doAdminLogin()">관리자 로그인</button>
  <div class="msg" id="loginMsg"></div>
  <div class="note">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4527A0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <span>관리자·운영자 계정만 접근할 수 있습니다. 사원 계정으로는 진입이 거부됩니다.</span>
  </div>
  <div class="back"><a href="index.html">← 직원 로그인으로 돌아가기</a></div>
  <div class="foot">v1.0 · 276홀딩스 영업지원팀 · 사내 교육 포털</div>
</div>

<script>
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwVv93ic_VlKwnQvm2wUYHtNX44AbYBJCH2XiSJRMiWjoY892NCKftniF5ufUgv2B7s/exec';

/* 이미 관리자 세션이면 콘솔로 바로 */
try{
  const s=JSON.parse(localStorage.getItem('lms_session')||'null');
  if(s&&(s.role==='super'||s.role==='operator')&&s.adminToken){ location.replace('admin.html'); }
}catch(e){}

async function loginReq(id,pw){
  const url=APPS_SCRIPT_URL+'?action=login&loginId='+encodeURIComponent(id)+'&pw='+encodeURIComponent(pw);
  return await (await fetch(url)).json();
}

async function doAdminLogin(){
  const id=document.getElementById('loginId').value.trim();
  let pw=document.getElementById('loginPw').value;
  const msg=document.getElementById('loginMsg');
  if(!id||!pw){ msg.className='msg err'; msg.textContent='아이디와 비밀번호를 입력하세요.'; return; }
  msg.className='msg'; msg.style.display='none'; msg.textContent='로그인 확인 중…'; msg.style.display='block';
  try{
    let j=await loginReq(id,pw);
    if(!j||!j.login){ msg.className='msg err'; msg.textContent=(j&&j.message)||'로그인에 실패했습니다.'; return; }
    /* 최초 로그인·초기화 시 비밀번호 변경 강제 */
    if(j.mustChange){
      const np=prompt('최초 로그인입니다. 새 비밀번호를 설정하세요 (4자 이상)');
      if(!np||np.length<4){ msg.className='msg err'; msg.textContent='비밀번호 변경 후 이용할 수 있습니다.'; return; }
      const cj=await (await fetch(APPS_SCRIPT_URL+'?action=change_password&loginId='+encodeURIComponent(id)
        +'&curPw='+encodeURIComponent(pw)+'&newPw='+encodeURIComponent(np))).json();
      if(cj.status!=='ok'){ msg.className='msg err'; msg.textContent=cj.message||'비밀번호 변경 실패'; return; }
      pw=np; j=await loginReq(id,pw);
      if(!j||!j.login){ msg.className='msg err'; msg.textContent='재로그인 실패 — 다시 시도하세요.'; return; }
    }
    const isAdm=(j.role==='super'||j.role==='operator');
    if(!isAdm || !j.adminToken){
      msg.className='msg err'; msg.textContent='관리자 권한이 없는 계정입니다. 학습은 직원 로그인을 이용하세요.'; return;
    }
    try{
      localStorage.setItem('lms_session',JSON.stringify({ name:j.name||id, loginId:id, dept:j.dept||'',
        role:j.role, adminToken:j.adminToken, status:j.acctStatus||'', loginAt:new Date().toISOString() }));
      localStorage.setItem('lms_student_name',j.name||id);
    }catch(e){}
    msg.className='msg ok'; msg.textContent='관리자로 로그인되었습니다. 콘솔로 이동합니다…';
    setTimeout(()=>location.href='admin.html',400);
  }catch(e){ msg.className='msg err'; msg.textContent='서버 연결 실패 — 잠시 후 다시 시도하세요.'; }
}
</script>
</body>
</html>
