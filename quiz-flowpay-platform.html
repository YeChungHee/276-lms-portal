<title>플로우페이 플랫폼 사용하기 — 퀴즈 (15문항) | 276홀딩스</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brand:#1A237E;--accent:#3949AB;--blue:#1565C0;--green:#2E7D32;--red:#C62828;
  --yellow:#F57F17;--bg:#F5F6FA;--card:#FFF;--border:#E0E3EF;--text:#202124;--muted:#666;
}
html{scroll-behavior:smooth;}
body{font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;line-height:1.7;padding-bottom:80px;}

.top-header{position:sticky;top:0;z-index:100;height:56px;
  background:linear-gradient(135deg,#0D1547,#1A237E,#3949AB);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;
  box-shadow:0 2px 8px rgba(0,0,0,.25);}
.top-header .brand{color:#fff;font-size:13px;opacity:.8;}
.top-header .title{color:#fff;font-size:16px;font-weight:700;}
.top-header .badge{background:rgba(255,255,255,.2);color:#fff;font-size:11px;padding:3px 12px;border-radius:99px;}

.wrap{max-width:820px;margin:0 auto;padding:32px 24px;}

.hero{background:linear-gradient(135deg,#0D1547,#283593);color:#fff;border-radius:16px;
  padding:30px 34px;margin-bottom:24px;}
.hero h1{font-size:26px;font-weight:700;margin-bottom:8px;}
.hero p{font-size:13.5px;opacity:.85;}

.name-row{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 20px;
  margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.name-row label{font-size:14px;font-weight:600;color:var(--brand);}
.name-row input{flex:1;min-width:180px;padding:9px 14px;border:2px solid var(--border);border-radius:8px;
  font-family:inherit;font-size:14px;outline:none;}
.name-row input:focus{border-color:var(--brand);}

.qcard{background:#fff;border:1px solid var(--border);border-radius:12px;padding:22px 26px;margin-bottom:16px;
  box-shadow:0 2px 8px rgba(26,35,126,.06);}
.qhead{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;}
.qnum{background:var(--brand);color:#fff;width:30px;height:30px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;}
.qtext{font-size:15.5px;font-weight:600;line-height:1.55;}
.qtag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:99px;background:#E8EAF6;color:#283593;
  border:1px solid #C5CAE9;margin-top:6px;font-weight:600;}
.opts{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
.opt{display:flex;align-items:center;gap:10px;padding:11px 16px;border:1.5px solid var(--border);border-radius:9px;
  cursor:pointer;transition:all .12s;font-size:14px;}
.opt:hover{border-color:var(--accent);background:#F5F6FA;}
.opt input{accent-color:var(--brand);width:16px;height:16px;flex-shrink:0;}
.opt.ox{flex:1;justify-content:center;font-weight:600;}
.ox-row{display:flex;gap:10px;}

/* 채점 후 */
.opt.correct{border-color:var(--green);background:#E8F5E9;}
.opt.wrong{border-color:var(--red);background:#FFEBEE;}
.explain{margin-top:12px;font-size:13.5px;background:#F0F1F8;border-left:4px solid var(--accent);
  border-radius:0 8px 8px 0;padding:10px 14px;color:#333;display:none;}
.explain.show{display:block;}
.explain .mark{font-weight:700;}
.explain .mark.o{color:var(--green);}
.explain .mark.x{color:var(--red);}

.actions{display:flex;justify-content:center;gap:12px;margin:26px 0;}
.btn{padding:12px 30px;border-radius:9px;border:none;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;}
.btn-primary{background:var(--brand);color:#fff;}
.btn-primary:hover{background:#0D1547;}
.btn-ghost{background:#fff;color:var(--brand);border:2px solid var(--border);}

/* 결과 */
.result{display:none;background:#fff;border:2px solid var(--brand);border-radius:14px;padding:28px;margin-bottom:24px;}
.result.show{display:block;}
.result h2{font-size:20px;color:var(--brand);margin-bottom:6px;}
.score-big{font-size:46px;font-weight:800;color:var(--brand);margin:8px 0;}
.score-big small{font-size:18px;color:var(--muted);font-weight:600;}
.grade-pill{display:inline-block;padding:5px 18px;border-radius:99px;font-weight:700;font-size:14px;margin-bottom:16px;}
.weak-title{font-size:14px;font-weight:700;color:var(--red);margin:16px 0 8px;}
.weak-list{display:flex;flex-wrap:wrap;gap:8px;}
.weak-tag{background:#FFEBEE;color:var(--red);border:1px solid #FFCDD2;font-size:12.5px;padding:4px 12px;border-radius:99px;font-weight:600;}
.weak-none{color:var(--green);font-weight:600;font-size:13.5px;}
.tag-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:14px;}
.tag-table th{background:var(--brand);color:#fff;padding:8px 12px;text-align:left;}
.tag-table td{padding:7px 12px;border-bottom:1px solid #EEF0F8;}
.tag-table .pass{color:var(--green);font-weight:600;}
.tag-table .fail{color:var(--red);font-weight:600;}


/* 공통 헤더 네비(통일) */
.top-header .qnav{display:flex;align-items:center;gap:8px;margin-left:14px;}
.top-header .qnav .who{color:#fff;opacity:.9;font-size:12px;display:flex;align-items:center;gap:4px;}
.top-header .qnav-link{color:#fff;opacity:.85;font-size:12px;text-decoration:none;padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.3);}
.top-header .qnav-link:hover{opacity:1;background:rgba(255,255,255,.14);}
.top-header .qnav-lo{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;font-family:inherit;font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer;}
.top-header .qnav-lo:hover{background:rgba(255,255,255,.26);}

@media print{.top-header,.actions,.name-row{display:none!important;}}
</style>
</head>

  <div class="hero">
    <h1>플로우페이 플랫폼 사용하기 — 이해도 점검</h1>
    <p>교과서 내용을 바탕으로 한 15문항입니다. 모두 답한 뒤 <strong>채점하기</strong>를 누르면 점수와 취약 영역(진단 태그)이 표시됩니다. 합격 기준 80%.</p>

<script>
var LMS_SESSION=null; try{LMS_SESSION=JSON.parse(localStorage.getItem('lms_session')||'null');}catch(e){}
if(!LMS_SESSION||!LMS_SESSION.name){ location.replace('index.html'); }
var QUIZ_USER=(LMS_SESSION&&LMS_SESSION.name)||'';
function quizLogout(){ if(confirm('로그아웃하시겠어요?')){ try{localStorage.removeItem('lms_session');localStorage.removeItem('lms_student_name');}catch(e){} location.replace('index.html'); } }
(function(){var w=document.getElementById('hdrWho'); if(w) w.textContent=QUIZ_USER||'—';})();
var APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwVv93ic_VlKwnQvm2wUYHtNX44AbYBJCH2XiSJRMiWjoY892NCKftniF5ufUgv2B7s/exec';
(function(){var w=document.getElementById('who'); if(w) w.textContent=QUIZ_USER;})();

// 문항 데이터 — answer는 정답 인덱스, tag는 진단 태그
const QUIZ = [
 {tag:"서비스정의", type:"ox", q:"플로우페이는 여신한도를 사용하는 대출(금융상품)이다.",
  opts:["O (그렇다)","X (아니다)"], answer:1,
  exp:"플로우페이는 대출이 아니라 유통 서비스입니다. 여신한도와 무관해 결산상 부채로 인식되지 않습니다."},

 {tag:"자금흐름", type:"mc", q:"플로우페이가 자금 흐름에서 하는 핵심 역할은?",
  opts:["고객사의 매출 채권을 사들여 현금화한다","고객을 대신해 매입처에 대금을 먼저 결제한다","매출처에 직접 물품을 판매한다","고객사에 신용 대출을 제공한다"], answer:1,
  exp:"플로우페이는 고객을 대신해 매입처에 매입 대금을 먼저 결제하고, 고객사는 매출 대금이 들어오면 플로우페이에 갚습니다."},

 {tag:"이용유형", type:"mc", q:"매출처가 '개인 소비자'인 사업자(예: 키즈카페, 커피숍)는 어떤 이용 유형인가?",
  opts:["B2B","B2C","B2G","둘 다 가능"], answer:1,
  exp:"매출처가 개인 소비자면 B2C, 기업·정부·공공기관이면 B2B입니다."},

 {tag:"이용유형", type:"mc", q:"B2B 유형의 자동 제출 인증서로 맞는 것은?",
  opts:["법인 공동인증서 1종","사업자 + 대표자 개인 공동인증서 2종","모바일 본인인증","대표자 개인 공동인증서 1종"], answer:0,
  exp:"B2B는 법인 공동인증서 1종, B2C는 사업자 공동인증서 + 대표자 개인 공동인증서 2종입니다."},

 {tag:"매입정보", type:"mc", q:"매입 물품 입력 시 부가세 '과세' 유형의 세율은?",
  opts:["0%","5%","10%","면세와 동일"], answer:2,
  exp:"과세 10% / 면세 0% / 영세 0%이며 세액은 자동 계산됩니다."},

 {tag:"매입정보", type:"mc", q:"'물품 받고 싶은 날'의 기본 규칙으로 맞는 것은?",
  opts:["신청 당일부터 가능","신청일 +10일 이후 (재거래는 다음날부터)","신청일 +30일 이후","제한 없음"], answer:1,
  exp:"기본은 신청일 +10일 이후이며 재거래는 다음날부터 가능합니다. 심사가 최대 7영업일이라 이 규칙이 있습니다."},

 {tag:"사업장정보", type:"ox", q:"신청서의 '사업장'은 신청하는 우리 고객사 본인 회사를 의미한다.",
  opts:["O (그렇다)","X (아니다)"], answer:0,
  exp:"사업장 = '신청하시는 분 본인 회사'입니다. 매입처·매출처와 혼동하지 않도록 안내하세요."},

 {tag:"서류제출", type:"mc", q:"'자동 제출이 안 돼요' 문의의 1순위 원인 두 가지는?",
  opts:["인터넷 속도 / 브라우저 종류","공동인증서 보안 프로그램 미설치 / 팝업 차단","서류 용량 초과 / 파일 형식","로그인 오류 / 세션 만료"], answer:1,
  exp:"자동 제출 실패 1순위 원인은 공동인증서 보안 프로그램 미설치와 팝업 차단입니다. 이 두 가지부터 확인하세요."},

 {tag:"서류제출", type:"mc", q:"서류 자동 제출(스크래핑) 절차는 총 몇 단계인가?",
  opts:["5단계","7단계","9단계","12단계"], answer:2,
  exp:"자동 제출은 9단계 절차이며 평균 10~15분 소요(스크래핑 3회 반복 포함)됩니다."},

 {tag:"매출결제", type:"mc", q:"'결제 유예 기간'의 정의로 맞는 것은?",
  opts:["신청한 날부터 심사 완료까지","물품 받은 날부터 우리(플로우페이)에게 갚는 날까지","계약일부터 첫 공급일까지","매출 발생일부터 세금계산서 발급일까지"], answer:1,
  exp:"결제 유예 기간 = '물품 받은 날(D-day)부터 우리에게 갚는 날(D+N)까지'입니다."},

 {tag:"매출결제", type:"ox", q:"한 번 정한 결제 유예 기간은 심사 후에도 절대 변동되지 않는다.",
  opts:["O (그렇다)","X (아니다)"], answer:1,
  exp:"결제 유예 기간은 심사 후 변동될 수 있습니다(축소 또는 연장). 고객에게 미리 안내해야 합니다."},

 {tag:"개념구분", type:"mc", q:"매입처 / 사업장 / 매출처를 입력하는 신청 단계가 바르게 짝지어진 것은?",
  opts:["매입처-1단계 / 사업장-2단계 / 매출처-3단계","매입처-2단계 / 사업장-3단계 / 매출처-4단계","매입처-3단계 / 사업장-2단계 / 매출처-4단계","모두 1단계에서 입력"], answer:1,
  exp:"매입처는 2단계, 사업장은 3단계, 매출처는 4단계에서 입력합니다."},

 {tag:"수정취소", type:"mc", q:"신청 완료 후 고객이 셀프로 '신청 취소'를 할 수 있는 기간은?",
  opts:["신청 완료 후 2일 이내","신청 완료 후 7일 이내","심사 완료 전까지 언제나","취소는 항상 고객센터 문의"], answer:0,
  exp:"신청 취소는 신청 완료 후 2일 동안만 셀프로 가능하며, 이후엔 고객센터(contact@276holdings.com)로 문의해야 합니다."},

 {tag:"심사진행", type:"mc", q:"심사 결과 알림톡에 응답 기한(6영업일) 내에 응답하지 않으면?",
  opts:["기한이 자동 연장된다","자동 취소된다","담당자가 임의로 진행한다","재신청으로 전환된다"], answer:1,
  exp:"응답 기한(6영업일) 내 미응답 시 자동 취소됩니다. 이 안내가 누락되면 고객이 무방비로 취소되므로 꼭 강조하세요."},

 {tag:"약정서명", type:"mc", q:"모두싸인 '거래명세서' 서명 시점으로 맞는 것은?",
  opts:["진행 확정 직후 바로","발주서와 동시에","실제 입고 완료 후에만","약정서 서명 전에 미리"], answer:2,
  exp:"거래명세서는 반드시 실제 입고 완료 후에만 서명할 수 있습니다. 미리 서명은 절대 안 됩니다. (발주서는 진행 확정 직후 서명)"}
];

const form = document.getElementById('quizForm');
function renderQuiz(){
  form.innerHTML = QUIZ.map((item,i)=>{
    const opts = item.opts.map((o,j)=>`
      <label class="opt ${item.type==='ox'?'ox':''}">
        <input type="radio" name="q${i}" value="${j}">
        <span>${o}</span>
      </label>`).join('');
    return `<div class="qcard" id="qcard${i}">
      <div class="qhead">
        <div class="qnum">${i+1}</div>
        <div><div class="qtext">${item.q}</div><span class="qtag">#${item.tag}</span></div>
      </div>
      <div class="opts ${item.type==='ox'?'ox-row':''}">${opts}</div>
      <div class="explain" id="exp${i}"></div>
    </div>`;
  }).join('');
}
renderQuiz();

function grade(){
  let correct=0, unanswered=0;
  const tagStat={};
  const detail=[];
  QUIZ.forEach((item,i)=>{
    tagStat[item.tag] = tagStat[item.tag] || {total:0,ok:0};
    tagStat[item.tag].total++;
    const sel = form.querySelector(`input[name="q${i}"]:checked`);
    const card = document.getElementById('qcard'+i);
    const opts = card.querySelectorAll('.opt');
    opts.forEach(o=>o.classList.remove('correct','wrong'));
    const exp = document.getElementById('exp'+i);
    const isCorrect = sel && parseInt(sel.value)===item.answer;
    detail.push({n:i+1,q:item.q,type:item.type,sel:sel?item.opts[parseInt(sel.value)]:'(미응답)',ans:item.opts[item.answer],ok:!!isCorrect,tag:item.tag,exp:item.exp});
    if(!sel) unanswered++;
    if(isCorrect){ correct++; tagStat[item.tag].ok++; }
    // 정답/오답 표시
    opts[item.answer].classList.add('correct');
    if(sel && !isCorrect) opts[parseInt(sel.value)].classList.add('wrong');
    const mark = isCorrect ? '<span class="mark o"><svg class="ic" width="15" height="15" style="vertical-align:-.16em;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round"><use href="#ic-check"/></svg> 정답</span>' : (sel?'<span class="mark x">오답 ✗</span>':'<span class="mark x">미응답</span>');
    exp.innerHTML = `${mark} &nbsp;${item.exp}`;
    exp.classList.add('show');
  });

  const pct = Math.round(correct/QUIZ.length*100);
  const grade = pct>=90?'우수':pct>=80?'합격':pct>=60?'재학습 권장':'보강 필요';
  const gradeColor = pct>=80?'#E8F5E9;color:#2E7D32':pct>=60?'#FFF8E1;color:#F57F17':'#FFEBEE;color:#C62828';

  // 취약 태그: 정답률 70% 미만
  const weak=[];
  let tagRows='';
  for(const t in tagStat){
    const s=tagStat[t]; const r=Math.round(s.ok/s.total*100);
    const pass = r>=70;
    if(!pass) weak.push(t);
    tagRows += `<tr><td>#${t}</td><td>${s.ok}/${s.total}</td><td class="${pass?'pass':'fail'}">${r}% ${pass?'':'⚠ 취약'}</td></tr>`;
  }
  const who = QUIZ_USER||'응시자';
  try{fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'quiz_submit',name:who,quiz:document.title.split('|')[0].trim(),correct:correct,pct:pct,grade:grade,weakTags:weak,detail:detail})});}catch(e){}
  const weakHtml = weak.length
    ? `<div class="weak-title">취약 영역 (정답률 70% 미만) — 보강 학습 권장</div>
       <div class="weak-list">${weak.map(t=>`<span class="weak-tag">#${t}</span>`).join('')}</div>`
    : `<div class="weak-title" style="color:#2E7D32">취약 영역 없음</div><span class="weak-none">모든 영역 70% 이상 — 잘하셨어요!</span>`;

  const res = document.getElementById('result');
  res.innerHTML = `
    <h2>${who}님의 채점 결과</h2>
    <div class="score-big">${pct}<small>점 / 100</small></div>
    <span class="grade-pill" style="background:${gradeColor}">${grade} · ${correct}/${QUIZ.length} 정답${unanswered?` · 미응답 ${unanswered}`:''}</span>
    ${weakHtml}
    <table class="tag-table">
      <tr><th>진단 태그</th><th>정답</th><th>정답률</th></tr>
      ${tagRows}
    </table>
    <p style="font-size:12px;color:#999;margin-top:12px;">※ 포털 연동 시 점수·취약 태그가 관리자 화면과 보강 과제 자동 생성에 반영됩니다.</p>`;
  res.classList.add('show');
  res.scrollIntoView({behavior:'smooth'});
}

function resetQuiz(){
  renderQuiz();
  document.getElementById('result').classList.remove('show');
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
