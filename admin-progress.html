<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교과서별 교육완료 현황 — 276홀딩스 LMS 어드민</title>
<style>
:root{--primary:#673AB7;--primary-dark:#4527A0;--primary-light:#EDE7F6;
  --success:#2E7D32;--danger:#C62828;--warn:#E65100;--info:#1565C0;
  --text:#212121;--text-sec:#616161;--border:#E0E0E0;--bg:#F5F5F5;--white:#FFF;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);font-size:13px;}

.topbar{background:var(--primary-dark);color:#fff;height:52px;padding:0 24px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.topbar-logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.tb-link{color:rgba(255,255,255,.65);font-size:12px;text-decoration:none;padding:4px 10px;border-radius:5px;transition:.2s;}
.tb-link:hover{color:#fff;background:rgba(255,255,255,.12);}

.hero{background:linear-gradient(135deg,#4527A0,#673AB7);color:#fff;padding:26px 28px;}
.hero h1{font-size:23px;font-weight:700;margin-bottom:5px;}
.hero p{font-size:13px;opacity:.82;}

.main{max-width:1120px;margin:0 auto;padding:22px 20px 60px;}

.card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:16px;}
.card h2{font-size:14px;color:var(--primary-dark);margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.card h2 .num{background:var(--primary);color:#fff;width:20px;height:20px;border-radius:6px;font-size:11px;
  display:inline-flex;align-items:center;justify-content:center;}

label{display:block;font-size:12px;font-weight:600;color:var(--text-sec);margin:0 0 5px;}
input{padding:9px 11px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:13px;outline:none;transition:.15s;}
input:focus{border-color:var(--primary);}

.btn{padding:10px 18px;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-ghost{background:var(--white);color:var(--primary);border:1px solid var(--primary);}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:7px;}

.keybar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
.keybar .fld{display:flex;flex-direction:column;}
.keybar input{width:240px;}

.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px;}
@media(max-width:680px){.summary{grid-template-columns:1fr;}}
.stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:13px;}
.stat-icon{width:42px;height:42px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:var(--primary-light);color:var(--primary);}
.stat-val{font-size:24px;font-weight:700;color:var(--text);line-height:1.1;}
.stat-label{font-size:11.5px;color:var(--text-sec);margin-top:2px;}

.list-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap;}
.list-head h2{margin-bottom:0;}
.list-tools{display:flex;gap:8px;align-items:center;}
.list-tools input{width:180px;padding:7px 11px;}

.notice{font-size:11.5px;color:var(--warn);background:#FFF3E0;border:1px solid #FFE0B2;border-radius:7px;
  padding:9px 12px;margin-bottom:12px;display:flex;align-items:center;gap:7px;line-height:1.5;}
.notice.hide{display:none;}

.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th,td{padding:10px 8px;text-align:center;border-bottom:1px solid var(--border);}
th{background:var(--primary-light);color:var(--primary-dark);font-weight:700;font-size:11.5px;white-space:nowrap;}
th.name-col,td.name-col{text-align:left;font-weight:700;white-space:nowrap;padding-left:14px;}
th.total-col,td.total-col{background:#FAF7FF;}
tbody tr:hover{background:#FBFAFE;}
td.total-col{font-weight:700;color:var(--primary);}

.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:9px;font-size:10.5px;font-weight:600;white-space:nowrap;}
.bg-green{background:#E8F5E9;color:var(--success);}
.bg-orange{background:#FFF3E0;color:var(--warn);}
.cell-none{color:#bbb;font-size:14px;}

.empty{text-align:center;color:#aaa;font-size:12.5px;padding:30px 0;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--primary-dark);color:#fff;
  padding:11px 22px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:200;}
.toast.show{opacity:1;}

/* 고정 메뉴(사이드바) */
.topbar{position:fixed;left:0;right:0;top:0;height:54px;}
body{padding-top:54px;padding-left:236px;}
.anav{position:fixed;left:0;top:54px;bottom:0;width:236px;background:#fff;border-right:1px solid var(--border);overflow-y:auto;z-index:80;padding:14px 0;}
.anav .ns{font-size:10px;font-weight:700;color:#999;letter-spacing:1px;padding:10px 20px 5px;text-transform:uppercase;}
.anav a{display:flex;align-items:center;gap:9px;padding:10px 20px;font-size:13px;color:#333;text-decoration:none;border-left:3px solid transparent;}
.anav a:hover{background:var(--bg);color:var(--primary);}
.anav a.active{background:var(--primary-light);color:var(--primary-dark);border-left-color:var(--primary);font-weight:700;}
.anav a svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
@media(max-width:820px){.anav{display:none;}body{padding-left:0;}}

</style>
</head>
<body>

<symbol id="ic-file" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></symbol>

<symbol id="ic-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></symbol>

<symbol id="ic-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></symbol>
</defs></svg>

<div class="topbar">
  <div class="topbar-logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#CE93D8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> 276홀딩스 LMS · 관리자 콘솔</div>
  <div class="topbar-right">
    <a href="dashboard.html" class="tb-link">사원 포털</a>

</div>

<div class="hero">
  <h1>교과서별 교육완료 현황표</h1>
  <p>사원별 5개 신입교육 교과서의 진도·완료 상태를 매트릭스로 확인합니다.</p>
</div>

<div class="main">

  <!-- 관리자 키 / 새로고침 -->
  <div class="card">
    <h2><span class="num"><svg width="12" height="12" style="fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round"><use href="#ic-refresh"/></svg></span> 데이터 조회</h2>
    <div class="keybar">
      <div class="fld">
        <label>관리자 키</label>
        <input id="adminKey" type="text" value="flowpay2026" placeholder="관리자 키">
      </div>
      <button class="btn btn-primary" onclick="loadCompletions()"><svg class="ic" width="14" height="14" style="vertical-align:-.15em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><use href="#ic-refresh"/></svg> 새로고침</button>
    </div>
  </div>

  <!-- 요약 카드 -->
  <div class="summary">
    <div class="stat">
      <div class="stat-icon"><svg width="22" height="22" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><use href="#ic-users"/></svg></div>
      <div><div class="stat-val" id="s-emp">0</div><div class="stat-label">총 사원 수</div></div>
    </div>
    <div class="stat">
      <div class="stat-icon"><svg width="22" height="22" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><use href="#ic-book"/></svg></div>
      <div><div class="stat-val" id="s-avg">0</div><div class="stat-label">평균 완료 교과서 수</div></div>
    </div>
    <div class="stat">
      <div class="stat-icon"><svg width="22" height="22" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><use href="#ic-trend"/></svg></div>
      <div><div class="stat-val" id="s-rate">0%</div><div class="stat-label">전체 완료율</div></div>
    </div>
  </div>

  <!-- 매트릭스 표 -->
  <div class="card">
    <div class="list-head">
      <h2><span class="num"><svg width="12" height="12" style="fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round"><use href="#ic-file"/></svg></span> 교육완료 매트릭스</h2>
      <div class="list-tools">
        <input id="searchBox" type="text" placeholder="사원 이름 검색…" oninput="renderTable()">
        <button class="btn btn-ghost btn-sm" onclick="exportCSV()"><svg class="ic" width="13" height="13" style="vertical-align:-.14em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><use href="#ic-download"/></svg> CSV 내보내기</button>
      </div>
    </div>
    <div class="notice hide" id="notice"><svg width="14" height="14" style="flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><use href="#ic-alert"/></svg> <span id="notice-msg"></span></div>
    <div class="table-wrap">
      <table id="matrix">
        <thead><tr id="thead-row"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwVv93ic_VlKwnQvm2wUYHtNX44AbYBJCH2XiSJRMiWjoY892NCKftniF5ufUgv2B7s/exec';

/* 교과서명(접두사) 키 — 표의 열 순서 */
const BOOKS=['회사소개','경제·금융발달','핀테크','매출채권','플로우페이 플랫폼','플로우페이 프로세스','심사·채권추심'];

let completions={};

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function showNotice(msg){
  const n=document.getElementById('notice');
  if(msg){document.getElementById('notice-msg').textContent=msg;n.classList.remove('hide');}
  else{n.classList.add('hide');}
}

/* ───── 데이터 조회 ───── */
function loadCompletions(){
  const key=document.getElementById('adminKey').value.trim();
  showNotice('');
  toast('데이터를 불러오는 중…');
  fetch(APPS_SCRIPT_URL+'?action=get_completions&key='+encodeURIComponent(key))
    .then(r=>r.json())
    .then(data=>{
      if(data&&data.status==='ok'&&data.completions){
        completions=data.completions;
        renderAll();
        toast('현황을 불러왔습니다');
      }else{
        useEmpty('표시할 데이터가 없습니다. Apps Script 배포·연동 후 표시됩니다.');
      }
    })
    .catch(()=>{
      useEmpty('표시할 데이터가 없습니다. (네트워크 오류 — Apps Script 연동 확인 필요)');
    });
}
function useEmpty(msg){
  completions={};
  showNotice(msg);
  renderAll();
}

/* ───── 셀 상태 판정 ───── */
function cellState(emp,book){
  const rec=completions[emp]&&completions[emp][book];
  if(!rec)return{type:'none'};
  if(rec.done)return{type:'done'};
  if(rec.progress&&rec.progress>0)return{type:'progress',n:rec.progress};
  return{type:'none'};
}
function doneCount(emp){
  return BOOKS.reduce((s,b)=>s+(cellState(emp,b).type==='done'?1:0),0);
}

/* ───── 요약 카드 ───── */
function renderSummary(){
  const emps=Object.keys(completions);
  const n=emps.length;
  let totalDone=0;
  emps.forEach(e=>{totalDone+=doneCount(e);});
  const avg=n?(totalDone/n):0;
  const totalCells=n*BOOKS.length;
  const rate=totalCells?Math.round(totalDone/totalCells*100):0;
  document.getElementById('s-emp').textContent=n;
  document.getElementById('s-avg').textContent=avg.toFixed(1);
  document.getElementById('s-rate').textContent=rate+'%';
}

/* ───── 표 ───── */
function renderHead(){
  const tr=document.getElementById('thead-row');
  tr.innerHTML='<th class="name-col">사원</th>'+
    BOOKS.map(b=>`<th>${b}</th>`).join('')+
    '<th class="total-col">완료 수</th>';
}
function renderTable(){
  const q=document.getElementById('searchBox').value.trim().toLowerCase();
  let emps=Object.keys(completions);
  if(q)emps=emps.filter(e=>e.toLowerCase().indexOf(q)>=0);
  emps.sort((a,b)=>a.localeCompare(b,'ko'));
  const tb=document.getElementById('tbody');
  if(!emps.length){
    tb.innerHTML=`<tr><td class="empty" colspan="${BOOKS.length+2}">표시할 사원이 없습니다</td></tr>`;
    return;
  }
  tb.innerHTML=emps.map(emp=>{
    const cells=BOOKS.map(b=>{
      const st=cellState(emp,b);
      if(st.type==='done')return `<td><span class="badge bg-green"><svg width="11" height="11" style="fill:none;stroke:currentColor;stroke-width:3;stroke-linecap:round;stroke-linejoin:round"><use href="#ic-check"/></svg> 완료</span></td>`;
      if(st.type==='progress')return `<td><span class="badge bg-orange">${st.n}단계</span></td>`;
      return `<td><span class="cell-none">–</span></td>`;
    }).join('');
    return `<tr><td class="name-col">${emp}</td>${cells}<td class="total-col">${doneCount(emp)}</td></tr>`;
  }).join('');
}
function renderAll(){renderHead();renderSummary();renderTable();}

/* ───── CSV 내보내기 ───── */
function exportCSV(){
  let emps=Object.keys(completions);
  emps.sort((a,b)=>a.localeCompare(b,'ko'));
  const header=['사원',...BOOKS,'완료 수'];
  const rows=[header];
  emps.forEach(emp=>{
    const row=[emp];
    BOOKS.forEach(b=>{
      const st=cellState(emp,b);
      if(st.type==='done')row.push('완료');
      else if(st.type==='progress')row.push(st.n+'단계');
      else row.push('미시작');
    });
    row.push(String(doneCount(emp)));
    rows.push(row);
  });
  const csv=rows.map(r=>r.map(c=>{
    const s=String(c);
    return (s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0)?'"'+s.replace(/"/g,'""')+'"':s;
  }).join(',')).join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='교육완료현황.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('CSV를 내보냈습니다');
}

/* ───── 초기화 ───── */
renderHead();
loadCompletions();
</script>
</body>
